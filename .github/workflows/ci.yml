name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check

      - name: Test server
        run: pnpm --filter @sync-tab-scroll/server test

      - name: Test client
        run: pnpm --filter @sync-tab-scroll/client test

      - name: Test pipeline
        run: pnpm --filter @sync-tab-scroll/pipeline test

      - name: Install Playwright browsers
        working-directory: client
        run: pnpm exec playwright install --with-deps chromium

      - name: Test client (component tests)
        run: pnpm --filter @sync-tab-scroll/client test:ct
